name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.24"
  NODE_VERSION: "20"

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
          working-directory: ./backend

  backend-test:
    runs-on: ubuntu-latest
    needs: [backend-lint]
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: inspecthse_test
          MYSQL_USER: inspecthse
          MYSQL_PASSWORD: inspecthsepass
        ports:
          - 3307:3306
        options: --health-cmd="mysqladmin ping -h localhost" --health-interval=10s --health-timeout=5s --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Test
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...
        working-directory: ./backend
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: "3307"
          DB_USER: inspecthse
          DB_PASSWORD: inspecthsepass
          DB_NAME: inspecthse_test
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: "6380"
      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.txt
          flags: backend
          fail_ci_if_error: false

  backend-build:
    runs-on: ubuntu-latest
    needs: [backend-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        run: go build -ldflags="-w -s" -o server ./cmd/server
        working-directory: ./backend

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json
      - name: Install
        run: npm ci
        working-directory: ./frontend
      - name: Lint
        run: npm run lint
        working-directory: ./frontend
      - name: Type Check
        run: npx tsc --noEmit
        working-directory: ./frontend

  frontend-test:
    runs-on: ubuntu-latest
    needs: [frontend-lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json
      - name: Install
        run: npm ci
        working-directory: ./frontend
      - name: Test
        run: npm run test -- --coverage
        working-directory: ./frontend
      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./frontend/coverage/
          flags: frontend
          fail_ci_if_error: false

  frontend-build:
    runs-on: ubuntu-latest
    needs: [frontend-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json
      - name: Install
        run: npm ci
        working-directory: ./frontend
      - name: Build
        run: npm run build
        working-directory: ./frontend
